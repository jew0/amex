workflows:
  ios-altstore-ipa:
    name: iOS IPA for AltStore (no codesign)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest

    scripts:
      # 1️⃣ Get dependencies
      - flutter pub get

      # 2️⃣ Install and update CocoaPods
      - name: Install CocoaPods
        script: |
          sudo gem install cocoapods -v 1.12.1
          pod repo update

      # 3️⃣ Clean previous builds
      - name: Clean build
        script: flutter clean

      # 4️⃣ Build iOS release without code signing
      - name: Build iOS release (AltStore)
        script: flutter build ios --release --no-codesign -v

      # 5️⃣ Verify Runner.app exists
      - name: Check app exists
        script: |
          if [ ! -d build/ios/iphoneos/Runner.app ]; then
            echo "Error: Runner.app not found!"
            exit 1
          fi

      # 6️⃣ Create IPA manually for AltStore
      - name: Create IPA manually
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r FlutterIpaExport.ipa Payload
          echo "✅ IPA ready: $(pwd)/FlutterIpaExport.ipa"

    # 7️⃣ Artifacts: the IPA to download from Codemagic
    artifacts:
      - build/ios/iphoneos/FlutterIpaExport.ipa
